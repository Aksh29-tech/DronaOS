spring.application.name=DronaOS

# Target your local PostgreSQL Docker container
spring.datasource.url=jdbc:postgresql://localhost:5432/drona_os_dev
spring.datasource.username=drona_os_admin
spring.datasource.password=rootpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Configurations
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ------------------------------------------------------------------------
# GLOBAL FLYWAY CONFIGURATION (Tier 1)
# ------------------------------------------------------------------------
spring.flyway.locations=classpath:db/migration/public
spring.flyway.baseline-on-migrate=true
spring.flyway.default-schema=public

# Local Sandbox Helper: Automatically clean database if validation checksum fails during dev
spring.flyway.clean-on-validation-error=true
spring.flyway.clean-disabled=false